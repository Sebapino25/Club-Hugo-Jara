<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Mario Marcel · Tesorería Club Hugo Jara</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#120E0D;
    --bg-card:#1C1513;
    --bg-card-alt:#261B18;
    --gold:#C6A15B;
    --gold-dim:#8A7245;
    --red:#C6362B;
    --red-dim:#8C2620;
    --green:#5C8A6C;
    --rose:#D9714B;
    --text:#F3ECE4;
    --text-dim:#A89B93;
    --border:rgba(198,54,43,0.25);
    --radius:18px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(1200px 600px at 10% -10%, #241614 0%, transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .display{font-family:'Archivo Black',sans-serif; letter-spacing:0.01em;}
  #root{max-width:520px; margin:0 auto; padding:20px 16px 80px;}

  .brandbar{display:flex; align-items:center; justify-content:space-between; padding:6px 2px 22px;}
  .brand-name{font-size:15px; letter-spacing:0.04em; text-transform:uppercase; color:var(--red);}
  .brand-sub{font-size:11px; color:var(--text-dim); margin-top:2px;}
  .logout-btn{background:none; border:1px solid var(--border); color:var(--text-dim); font-size:12px; padding:7px 14px; border-radius:100px; cursor:pointer;}
  .logout-btn:active{background:var(--bg-card-alt);}
  .crest-mini{width:38px; height:38px; object-fit:contain; flex:none; border-radius:6px;}

  .card{
    background:linear-gradient(160deg, var(--bg-card), var(--bg-card-alt));
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:20px;
    margin-bottom:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
  }
  .login-card{margin-top:15vh;}
  .seal-wrap{display:flex; justify-content:center; margin-bottom:22px;}
  .crest-img{
    width:120px; height:120px; object-fit:contain;
    filter:drop-shadow(0 8px 18px rgba(0,0,0,0.5));
  }

  h1.title{font-size:22px; margin:0 0 4px; text-align:center;}
  p.subtitle{font-size:13px; color:var(--text-dim); text-align:center; margin:0 0 24px;}

  label{display:block; font-size:12px; color:var(--text-dim); margin:14px 0 6px;}
  input, select, textarea{
    width:100%; background:#101A24; border:1px solid var(--border);
    color:var(--text); padding:13px 14px; border-radius:12px; font-size:15px;
    font-family:'Inter',sans-serif;
  }
  input:focus, select:focus, textarea:focus{outline:2px solid var(--red-dim); outline-offset:1px;}

  .btn{
    width:100%; padding:14px; border-radius:100px; border:none;
    background:var(--red); color:var(--text); font-weight:700; font-size:15px;
    cursor:pointer; margin-top:18px;
  }
  .btn:active{background:var(--red-dim);}
  .btn.secondary{background:transparent; border:1px solid var(--border); color:var(--text); font-weight:600;}
  .btn:disabled{opacity:0.5;}

  .error{color:var(--rose); font-size:13px; margin-top:10px; text-align:center;}

  .tabs{display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:16px;}
  .tab{
    flex:none; padding:9px 16px; border-radius:100px; font-size:13px;
    border:1px solid var(--border); color:var(--text-dim); cursor:pointer; white-space:nowrap;
  }
  .tab.active{background:var(--red); color:var(--text); border-color:var(--red); font-weight:700;}

  .summary-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px;}
  .summary-box{background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:14px;}
  .summary-box .label{font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.03em;}
  .summary-box .value{font-family:'Archivo Black',sans-serif; font-size:19px; margin-top:6px;}
  .value.ingreso{color:var(--green);}
  .value.gasto{color:var(--rose);}
  .value.comision{color:var(--gold);}

  .section-title{font-size:13px; text-transform:uppercase; letter-spacing:0.04em; color:var(--text-dim); margin:22px 0 10px;}

  .type-toggle{display:flex; gap:8px; margin-top:14px;}
  .type-btn{flex:1; padding:12px; border-radius:12px; border:1px solid var(--border); background:transparent; color:var(--text-dim); font-weight:600; cursor:pointer;}
  .type-btn.active.ingreso{background:rgba(92,138,108,0.18); border-color:var(--green); color:var(--green);}
  .type-btn.active.gasto{background:rgba(178,100,92,0.18); border-color:var(--rose); color:var(--rose);}

  .tx-item{
    display:flex; justify-content:space-between; align-items:center;
    padding:13px 0; border-bottom:1px solid var(--border);
  }
  .tx-item:last-child{border-bottom:none;}
  .tx-cat{font-size:14px; font-weight:600;}
  .tx-desc{font-size:12px; color:var(--text-dim); margin-top:2px;}
  .tx-amount{font-family:'Archivo Black',sans-serif; font-size:15px;}
  .tx-amount.ingreso{color:var(--green);}
  .tx-amount.gasto{color:var(--rose);}
  .empty{text-align:center; color:var(--text-dim); font-size:13px; padding:20px 0;}

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--red); color:var(--text); padding:12px 20px; border-radius:100px;
    font-size:13px; font-weight:700; box-shadow:0 8px 24px rgba(0,0,0,0.4);
    display:flex; align-items:center; gap:8px; animation:fadeUp 0.25s ease;
  }
  @keyframes fadeUp{from{opacity:0; transform:translate(-50%,10px);} to{opacity:1; transform:translate(-50%,0);}}

  .loading{text-align:center; color:var(--text-dim); padding:60px 0; font-size:14px;}
</style>
</head>

function Seal(){
  return h("div",{className:"seal-wrap"},
    h("img",{src:CREST_SRC, className:"crest-img", alt:"Escudo Club Hugo Jara"})
  );
}

function Toast({message}){
  if(!message) return null;
  return h("div",{className:"toast"}, "✓ ", message);
}

function LoginView({onLogin}){
  const [email,setEmail] = useState("");
  const [password,setPassword] = useState("");
  const [error,setError] = useState("");
  const [loading,setLoading] = useState(false);
  const [sentReset,setSentReset] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setError(""); setLoading(true);
    const { error } = await sb.auth.signInWithPassword({ email, password });
    setLoading(false);
    if(error){ setError("No pude iniciar sesión. Revisa el correo y la contraseña."); return; }
    onLogin();
  };

  const forgotPassword = async () => {
    if(!email){ setError("Escribe tu correo arriba primero, luego toca este link de nuevo."); return; }
    setError("");
    await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + window.location.pathname });
    setSentReset(true);
  };

  return h("div",null,
    h("div",{className:"card login-card"},
      h(Seal),
      h("h1",{className:"title display"},"Mario Marcel"),
      h("p",{className:"subtitle"},"Tesorería · Club Hugo Jara"),
      h("form",{onSubmit:submit},
        h("label",null,"Correo"),
        h("input",{type:"email",value:email,onChange:e=>setEmail(e.target.value),required:true,autoCapitalize:"none"}),
        h("label",null,"Contraseña"),
        h("input",{type:"password",value:password,onChange:e=>setPassword(e.target.value),required:true}),
        error && h("div",{className:"error"},error),
        h("button",{className:"btn",disabled:loading,type:"submit"}, loading? "Ingresando...":"Ingresar")
      ),
      sentReset
        ? h("p",{className:"subtitle",style:{marginTop:16}},"Te enviamos un correo para definir tu contraseña. Ábrelo desde este mismo celular.")
        : h("button",{type:"button",onClick:forgotPassword,className:"logout-btn",style:{width:"100%",marginTop:16}},"¿Olvidaste tu contraseña?")
    )
  );
}

function RecoverPasswordView({onDone}){
  const [password,setPassword] = useState("");
  const [confirm,setConfirm] = useState("");
  const [error,setError] = useState("");
  const [loading,setLoading] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setError("");
    if(password.length < 6){ setError("La contraseña debe tener al menos 6 caracteres."); return; }
    if(password !== confirm){ setError("Las contraseñas no coinciden."); return; }
    setLoading(true);
    const { error } = await sb.auth.updateUser({ password });
    setLoading(false);
    if(error){ setError("No se pudo actualizar. Intenta pedir el link de nuevo."); return; }
    onDone();
  };

  return h("div",null,
    h("div",{className:"card login-card"},
      h(Seal),
      h("h1",{className:"title display"},"Nueva contraseña"),
      h("p",{className:"subtitle"},"Defínela y listo, quedará guardada"),
      h("form",{onSubmit:submit},
        h("label",null,"Contraseña nueva"),
        h("input",{type:"password",value:password,onChange:e=>setPassword(e.target.value),required:true}),
        h("label",null,"Repítela"),
        h("input",{type:"password",value:confirm,onChange:e=>setConfirm(e.target.value),required:true}),
        error && h("div",{className:"error"},error),
        h("button",{className:"btn",disabled:loading,type:"submit"}, loading?"Guardando...":"Guardar contraseña")
      )
    )
  );
}

function TransaccionForm({plantelId, categorias, onSaved}){
  const [tipo,setTipo] = useState("ingreso");
  const [categoriaId,setCategoriaId] = useState("");
  const [monto,setMonto] = useState("");
  const [fecha,setFecha] = useState(()=> new Date().toISOString().slice(0,10));
  const [descripcion,setDescripcion] = useState("");
  const [saving,setSaving] = useState(false);

  const opciones = categorias.filter(c=>c.tipo===tipo);

  useEffect(()=>{
    if(opciones.length && !opciones.find(o=>o.id===categoriaId)){
      setCategoriaId(opciones[0].id);
    }
  },[tipo, categorias]);

  const submit = async (e) => {
    e.preventDefault();
    if(!monto || !categoriaId) return;
    setSaving(true);
    const { data:{ user } } = await sb.auth.getUser();
    const { error } = await sb.from("transacciones").insert({
      plantel_id: plantelId,
      categoria_id: categoriaId,
      monto: parseFloat(monto),
      fecha,
      descripcion,
      created_by: user.id
    });
    setSaving(false);
    if(!error){
      setMonto(""); setDescripcion("");
      onSaved();
    }
  };

  return h("form",{onSubmit:submit},
    h("div",{className:"type-toggle"},
      h("button",{type:"button", className:"type-btn ingreso"+(tipo==="ingreso"?" active":""), onClick:()=>setTipo("ingreso")},"Ingreso"),
      h("button",{type:"button", className:"type-btn gasto"+(tipo==="gasto"?" active":""), onClick:()=>setTipo("gasto")},"Gasto")
    ),
    h("label",null,"Categoría"),
    h("select",{value:categoriaId, onChange:e=>setCategoriaId(e.target.value)},
      opciones.map(o=> h("option",{key:o.id, value:o.id}, o.nombre))
    ),
    h("label",null,"Monto (CLP)"),
    h("input",{type:"number", inputMode:"numeric", value:monto, onChange:e=>setMonto(e.target.value), placeholder:"0", required:true}),
    h("label",null,"Fecha"),
    h("input",{type:"date", value:fecha, onChange:e=>setFecha(e.target.value)}),
    h("label",null,"Descripción (opcional)"),
    h("input",{type:"text", value:descripcion, onChange:e=>setDescripcion(e.target.value), placeholder:"Ej: Carne para asado"}),
    h("button",{className:"btn", disabled:saving, type:"submit"}, saving?"Guardando...":"Registrar")
  );
}

function TransaccionList({items, categorias}){
  if(!items.length) return h("div",{className:"empty"},"Todavía no hay movimientos registrados.");
  const catName = (id) => (categorias.find(c=>c.id===id)||{}).nombre || "—";
  return h("div",null,
    items.map(tx => h("div",{key:tx.id, className:"tx-item"},
      h("div",null,
        h("div",{className:"tx-cat"}, catName(tx.categoria_id)),
        h("div",{className:"tx-desc"}, tx.fecha + (tx.descripcion?" · "+tx.descripcion:""))
      ),
      h("div",{className:"tx-amount "+tx.tipo}, (tx.tipo==="gasto"?"-":"+")+CLP(tx.monto))
    ))
  );
}

function PlantelPanel({plantel, categorias, showComision}){
  const [txs,setTxs] = useState([]);
  const [loading,setLoading] = useState(true);
  const [toast,setToast] = useState("");

  const load = async () => {
    setLoading(true);
    const { data } = await sb.from("transacciones")
      .select("*")
      .eq("plantel_id", plantel.id)
      .order("fecha",{ascending:false});
    setTxs(data || []);
    setLoading(false);
  };

  useEffect(()=>{ load(); },[plantel.id]);

  const totals = useMemo(()=>{
    let ingreso=0, gasto=0, comisionable=0;
    const catMap = {};
    categorias.forEach(c=>catMap[c.id]=c.nombre);
    txs.forEach(tx=>{
      const monto = parseFloat(tx.monto);
      if(tx.tipo==="ingreso"){
        ingreso += monto;
        const nombre = (catMap[tx.categoria_id]||"").toLowerCase();
        if(nombre.includes("matr")||nombre.includes("mensual")) comisionable += monto;
      } else {
        gasto += monto;
      }
    });
    return { ingreso, gasto, saldo: ingreso-gasto, comision: comisionable * (plantel.comision_pct/100) };
  },[txs, categorias]);

  const onSaved = () => {
    setToast("Registrado · Mario Marcel, Tesorería");
    setTimeout(()=>setToast(""),2200);
    load();
  };

  return h("div",null,
    h("div",{className:"summary-grid"},
      h("div",{className:"summary-box"}, h("div",{className:"label"},"Ingresos"), h("div",{className:"value ingreso"}, CLP(totals.ingreso))),
      h("div",{className:"summary-box"}, h("div",{className:"label"},"Gastos"), h("div",{className:"value gasto"}, CLP(totals.gasto))),
      h("div",{className:"summary-box"}, h("div",{className:"label"},"Saldo"), h("div",{className:"value"}, CLP(totals.saldo))),
      showComision && h("div",{className:"summary-box"}, h("div",{className:"label"},"Comisión ("+plantel.comision_pct+"%)"), h("div",{className:"value comision"}, CLP(totals.comision)))
    ),
    h("div",{className:"card"},
      h("div",{className:"section-title"},"Registrar movimiento"),
      h(TransaccionForm,{plantelId:plantel.id, categorias, onSaved})
    ),
    h("div",{className:"card"},
      h("div",{className:"section-title"},"Movimientos"),
      loading? h("div",{className:"empty"},"Cargando...") : h(TransaccionList,{items:txs, categorias})
    ),
    h(Toast,{message:toast})
  );
}

function Dashboard({profile, onLogout}){
  const [planteles,setPlanteles] = useState([]);
  const [categorias,setCategorias] = useState([]);
  const [activeId,setActiveId] = useState(profile.plantel_id || null);
  const [loading,setLoading] = useState(true);
  const [loadError,setLoadError] = useState("");

  useEffect(()=>{
    (async()=>{
      const [plRes, catRes] = await Promise.all([
        sb.from("planteles").select("*").order("nombre"),
        sb.from("categorias").select("*")
      ]);
      if(plRes.error || catRes.error){
        setLoadError((plRes.error && plRes.error.message) || (catRes.error && catRes.error.message) || "Error desconocido");
      }
      setPlanteles(plRes.data || []);
      setCategorias(catRes.data || []);
      if(profile.rol==="general" && plRes.data && plRes.data.length) setActiveId(plRes.data[0].id);
      setLoading(false);
    })();
  },[]);

  if(loading) return h("div",{className:"loading"},"Cargando tesorería...");

  const activePlantel = planteles.find(p=>p.id===activeId);

  if(loadError) return h("div",{className:"card"},
    h("div",{className:"error"}, "No se pudieron cargar los datos: "+loadError),
    h("button",{className:"logout-btn", onClick:onLogout, style:{marginTop:12}},"Salir")
  );

  if(!activePlantel && profile.rol!=="general") return h("div",{className:"card"},
    h("div",{className:"error"}, "Tu cuenta no tiene un plantel asignado todavía (plantel_id vacío o no coincide con ninguno). Avísale a Seba para revisar tu perfil."),
    h("button",{className:"logout-btn", onClick:onLogout, style:{marginTop:12}},"Salir")
  );

  return h("div",null,
    h("div",{className:"brandbar"},
      h("div",{style:{display:"flex",alignItems:"center",gap:"10px"}},
        h("img",{src:CREST_SRC, className:"crest-mini"}),
        h("div",null,
        h("div",{className:"brand-name display"},"Mario Marcel"),
        h("div",{className:"brand-sub"}, profile.rol==="general" ? "Tesorería general · "+profile.nombre : "Tesorero · "+(activePlantel?activePlantel.nombre:""))
        )
      ),
      h("button",{className:"logout-btn", onClick:onLogout},"Salir")
    ),
    profile.rol==="general" && h("div",{className:"tabs"},
      planteles.map(p => h("div",{
        key:p.id,
        className:"tab"+(p.id===activeId?" active":""),
        onClick:()=>setActiveId(p.id)
      }, p.nombre))
    ),
    activePlantel && h(PlantelPanel,{
      plantel:activePlantel,
      categorias,
      showComision: profile.rol==="general"
    })
  );
}

function App(){
  const [session,setSession] = useState(null);
  const [profile,setProfile] = useState(null);
  const [checking,setChecking] = useState(true);
  const [recovering,setRecovering] = useState(false);

  const loadProfile = async () => {
    const { data:{ user } } = await sb.auth.getUser();
    if(!user){ setProfile(null); setChecking(false); return; }
    const { data } = await sb.from("profiles").select("*").eq("id", user.id).single();
    setProfile(data);
    setChecking(false);
  };

  useEffect(()=>{
    sb.auth.getSession().then(({data})=>{
      setSession(data.session);
      if(data.session) loadProfile(); else setChecking(false);
    });
    const { data: listener } = sb.auth.onAuthStateChange((event, sess)=>{
      if(event === "PASSWORD_RECOVERY"){ setRecovering(true); setChecking(false); return; }
      setSession(sess);
      if(sess) loadProfile();
    });
    return ()=> listener.subscription.unsubscribe();
  },[]);

  const onLogout = async () => {
    await sb.auth.signOut();
    setProfile(null);
  };

  if(checking) return h("div",{className:"loading"},"Cargando...");
  if(recovering) return h(RecoverPasswordView,{onDone:()=>{ setRecovering(false); loadProfile(); }});
  if(!session || !profile) return h(LoginView,{onLogin:loadProfile});
  return h(Dashboard,{profile, onLogout});
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
